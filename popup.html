<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="bg-black/35 w-full h-screen fixed top-0 left-0">
        <div class="w-[800px] rounded-[15px] bg-white flex mx-auto mt-[80px] overflow-hidden">
            <img class="w-[40%] object-cover" src="public/images/food-1.png" alt="food">
            <div class="w-[60%] p-[30px]">
                <h3 class="text-2xl font-[600] text-primary">Burger Name</h3>
                <div class="flex">
                    <div class="flex items-center mr-3">
                        <img class="w-3" src="public/images/star.svg" alt="star img">
                        <span class="text-body pl-1.5 text-[12px]">4.8</span>
                    </div>
                    <div class="flex items-center">
                        <img class="w-3" src="public/images/clock.svg" alt="clock img">
                        <span class="text-body pl-1.5 text-[12px]">25 - 30 mins</span>
                    </div>
                </div>
                <p>Category: <span class="text-primary">Burger</span></p>
                <p class="text-body py-3">A faded television actor and his stunt double strive to achieve fame and success in the film industry during the final years.</p>

                <div class="flex gap-x-2">
                    <button class="bg-primary px-4 py-2 rounded-[6px] text-white cursor-pointer" type="button">Add to cart - <span class="font-[600]">$500</span></button>
                    <button class="bg-black px-4 py-2 rounded-[6px] text-white cursor-pointer" type="button">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

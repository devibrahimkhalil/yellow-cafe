<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yellow Cafe</title>
    <link rel="stylesheet" href="src/style.css" />

    <link
      rel="shortcut icon"
      href="public/images/favicon.png"
      type="image/png"
    />
  </head>
  <body>
    <!-- Menu start -->
    <div
      class="w-[235px] bg-white h-screen p-[20px] fixed left-0 top-0"
      id="leftSidebar"
    ></div>
    <!-- Menu end -->

    <div class="fixed left-[255px] top-0">
      <!-- Header start -->
      <div
        class="w-[calc(100vw-255px)] flex justify-between items-center h-[70px] pr-[20px]"
        id="header"
      ></div>
      <!-- Header end -->

      <!-- Body start -->
      <div class="flex">
        <!-- Left-side start -->
        <div
          class="w-[calc(100vw-555px)] overflow-y-scroll scrollbar-none h-[calc(100vh-70px)]"
        >
          <!-- Banner start -->
          <div id="banner"></div>
          <!-- Banner end -->

          <!-- Food category start -->
          <div id="category"></div>
          <!-- Food category end -->

          <!-- Food carts start -->
          <div id="foodItem"></div>

          <!-- Food carts end -->
        </div>

        <!-- Left-side end -->

        <!-- Right-side start -->
        <div
          class="w-[260px] mx-[20px] bg-white rounded-[15px] relative"
          id="cart-area"
        ></div>
        <!-- Right-side end -->
      </div>
      <!-- Body end -->
    </div>

    <div id="modal"></div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
